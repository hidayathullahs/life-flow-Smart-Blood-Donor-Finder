name: smart_blood_life
description: A startup-quality healthcare blood donor finder app.
version: 1.0.0+1

publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.0

  # State Management & Hooks
  flutter_riverpod: ^2.5.1
  flutter_hooks: ^0.20.5

  # Routing
  go_router: ^14.0.1

  # Firebase Core and Services
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.2.0
  firebase_messaging: ^15.0.0
  firebase_analytics: ^11.0.0
  firebase_crashlytics: ^4.0.0
  google_sign_in: ^6.2.1
  local_auth: ^2.2.0
  mobile_scanner: ^5.0.0
  google_generative_ai: ^0.2.2

  # Maps & Location
  google_maps_flutter: ^2.6.1
  geolocator: ^12.0.0
  permission_handler: ^11.3.1

  # Utils & UI helpers
  image_picker: ^1.1.1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  qr_flutter: ^4.1.0
  pdf: ^3.10.8
  printing: ^5.11.1
  share_plus: ^9.0.0
  url_launcher: ^6.2.6
  uuid: ^4.3.3
  intl: ^0.19.0

  # Offline Storage & Connectivity
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0
  connectivity_plus: ^6.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  hive_generator: ^2.0.1
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lottie/

name: SmartBloodLife Mobile CI/CD

on:
  push:
    branches: [ main ]
    paths:
      - 'mobile/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'mobile/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.x'
        channel: 'stable'

    - name: Install dependencies
      run: |
        cd mobile
        flutter pub get

    - name: Analyze code lints
      run: |
        cd mobile
        flutter analyze

    - name: Run unit tests
      run: |
        cd mobile
        flutter test

    - name: Build Android APK
      run: |
        cd mobile
        flutter build apk --debug
